apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-deployment
spec:
  selector:
    matchLabels:
      app: nginx
      tier: frontend
  replicas: 5
  strategy:
    type: RollingUpdate # Recreate possible
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      containers:
        - name: example-container
          image: nginx:latest
          envFrom:
            - configMapRef:
                name: example-configmap
            - secretRef:
                name: example-secret
          env:
            - name: VARIABLE_NAME
              value: value
            - name: VARIABLE_BIS
              value: "12345"
            - name: VARIABLE_FROM_CONFIGMAP
              valueFrom:
                configMapKeyRef:
                  name: example-configmap
                  key: TOTO
            - name: VARIABLE_FROM_SECRET
              valueFrom:
                secretKeyRef:
                  name: example-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "1"
              memory: "256Mi"
