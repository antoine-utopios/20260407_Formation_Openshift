apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-deployment
spec:
  selector:
    matchLabels:
      app: nginx
      tier: frontend
  replicas: 5
  strategy:
    type: RollingUpdate # Recreate possible
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      volumes:
        - name: demo-emptydir
          emptyDir:
            medium: Memory
            sizeLimit: "1Gi"
      containers:
        - name: example-container
          image: nginx:latest
          volumeMounts:
            - name: demo-emptydir
              mountPath: /path/to/folder
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "1"
              memory: "256Mi"
