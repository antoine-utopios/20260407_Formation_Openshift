apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-deployment
spec:
  selector:
    matchLabels:
      app: nginx
      tier: frontend
  replicas: 5
  strategy:
    type: RollingUpdate # Recreate possible
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      # On résiste à une teinte sur un noeud qui a pour but de repousser par défaut tous les déploiement sur ce noeud
      # oc taint nodes node/nom-node key=value:NoExecute
      tolerations:
        - key: "country"
          value: "france"
          effect: "NoSchedule" # NoExecute | NoSchedule | PreferNoSchedule
          operator: "Equal"
      # On veut aller se positionner sur un noeud spécifique
      # oc label nodes node/nom-node key=value
      affinity:
        nodeAffinity:
          # preferredDuringSchedulingIgnoredDuringExecution:
          # -
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "country"
                    values: ["france"]
                    operator: "In"
      containers:
        - name: example-container
          image: nginx:latest
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "1"
              memory: "256Mi"
