apiVersion: apps/v1
kind: Deployment
metadata:
  name: exo-07-usa-2048
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exo-07-usa-2048
      tier: frontend
  template:
    metadata:
      name: exo-07-usa-2048-pod
      labels:
        app: exo-07-usa-2048
        tier: frontend
    spec:
      tolerations:
        - key: "country"
          operator: "Equal"
          value: "usa"
          effect: "NoExecute"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "country"
                    operator: "In"
                    values: ["usa"]
      containers:
        - name: exo-07-usa-2048-container
          image: quchaonet/2048:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
