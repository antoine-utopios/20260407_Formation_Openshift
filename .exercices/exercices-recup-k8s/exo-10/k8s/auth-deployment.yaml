apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: exo-10-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: gharrowbm/kube-exo-10-auth:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
