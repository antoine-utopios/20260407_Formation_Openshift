apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: exo-10-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gharrowbm/kube-exo-10-frontend:latest
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
